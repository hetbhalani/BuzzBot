version: '3.8'

services:
  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  bot:
    build: .
    command: python -c "from bot.telegram_bot import start_persistent_bot; start_persistent_bot()"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  airflow:
    build: .
    command: airflow standalone
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_FOLDER=/app/dags
    volumes:
      - ./dags:/app/dags
      - airflow_data:/root/airflow
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
  airflow_data:
